<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy 18th Birthday Bushra 🎂</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(#ffe6f0,#ffffff);
}

#giftScreen{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#gift{
font-size:120px;
cursor:pointer;
}

#main{
display:none;
padding:20px;
}

h1{
color:#ff2e88;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:20px;
}

.gallery img{
width:220px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div id="giftScreen">
<h2>🎁 Click the Gift 🎁</h2>
<div id="gift">🎁</div>
</div>

<div id="main">

<h1>🎉 Happy 18th Birthday Bushra 🎉</h1>

<audio id="music" loop>
<source src="birthday.mp3" type="audio/mpeg">
</audio>

<p>Welcome to adulthood! May your life be filled with happiness and dreams coming true. 🎂</p>

<h2>📸 Memories</h2>

<div class="gallery">

<img src="https://i.postimg.cc/phMh8MS1/Screenshot-2026-03-02-00-08-00-987-com-google-android-apps-photos.jpg">

<img src="https://i.postimg.cc/34jyFb5H/Screenshot-2026-03-02-00-08-13-044-com-google-android-apps-photos.jpg">

<img src="https://i.postimg.cc/qhctxZV0/Snapchat-1170230493.jpg">

<img src="https://i.postimg.cc/r0GdNYX8/Snapchat-320908136.jpg">

<img src="https://i.postimg.cc/S2LXftFQ/Snapchat-545246512.jpg">

</div>

</div>

<script>

document.getElementById("gift").onclick=function(){

document.getElementById("giftScreen").style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("music").play();

}

</script>

</body>
</html>
